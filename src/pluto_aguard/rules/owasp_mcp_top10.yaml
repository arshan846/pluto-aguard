# OWASP MCP Top 10 Rule Definitions
# Reference: https://owasp.org/www-project-mcp-top-10/
#
# These rules map security checks to the OWASP MCP Top 10 framework.
# Each rule defines what to check and the severity of violations.

rules:
  - id: MCP01:2025
    title: "Token Mismanagement & Secret Exposure"
    description: >
      Long-lived tokens, hardcoded credentials, and other secrets exposed in agent
      configurations, source files, environment files, or logs.
    severity: high
    checks:
      - type: static_long_lived_token
      - type: hardcoded_credentials
      - type: secret_patterns
        patterns:
          - aws_access_key
          - aws_secret_key
          - generic_api_key
          - bearer_token
          - private_key
          - github_token
          - openai_key
          - azure_key
          - connection_string
          - slack_token

  - id: MCP02:2025
    title: "Privilege Escalation via Scope Creep"
    description: >
      Agents or MCP servers with permissions broader than required, including
      wildcard access, missing permission declarations, or unauthorized tools.
    severity: critical
    checks:
      - type: permission_scope
        condition: wildcard_or_full_access
      - type: wildcard_permissions
      - type: missing_permission_declarations
      - type: unauthorized_tool_access

  - id: MCP03:2025
    title: "Tool Poisoning"
    description: >
      Malicious or manipulated tool definitions that embed hidden instructions
      in metadata, descriptions, or schemas to influence agent behavior.
    severity: critical
    checks:
      - type: tool_description_injection
        patterns:
          - "ignore previous"
          - "disregard"
          - "override"
          - "system prompt"
          - "you are now"
          - "forget your instructions"
          - "act as"
          - "pretend to be"

  - id: MCP04:2025
    title: "Software Supply Chain Attacks & Dependency Tampering"
    description: >
      Use of unvetted or tampered MCP tools, plugins, dependencies, or server
      images without integrity verification or provenance checks.
    severity: medium
    checks:
      - type: unverified_tool_source
      - type: no_integrity_check

  - id: MCP05:2025
    title: "Command Injection & Execution"
    description: >
      Dangerous tools or denied actions that can execute commands, modify files,
      or trigger impactful changes without proper human approval or safeguards.
    severity: high
    checks:
      - type: dangerous_tool_without_hitl
        tools:
          - execute
          - shell
          - file_write
          - file_delete
          - sudo
          - deploy
          - send_email
          - database_delete

  - id: MCP06:2025
    title: "Intent Flow Subversion"
    description: >
      Agent intent or control flow manipulated by untrusted inputs, causing the
      model to deviate from expected objectives or guardrails.
    severity: high
    checks:
      - type: intent_flow_subversion

  - id: MCP07:2025
    title: "Insufficient Authentication & Authorization"
    description: >
      Remote MCP servers that lack authentication, authorization controls, or
      secure transport protections for agent communications.
    severity: critical
    checks:
      - type: unauthenticated_remote_server
      - type: http_transport
        condition: url_starts_with_http

  - id: MCP08:2025
    title: "Lack of Audit and Telemetry"
    description: >
      Agent deployments without logging, auditing, or behavioral monitoring of
      tool calls, approvals, and sensitive data access patterns.
    severity: medium
    checks:
      - type: no_audit_logging
      - type: no_behavioral_monitoring

  - id: MCP09:2025
    title: "Shadow MCP Servers"
    description: >
      Unapproved or unknown MCP servers operating outside governance controls,
      increasing the risk of data exfiltration and unmanaged capabilities.
    severity: medium
    checks:
      - type: shadow_mcp_server

  - id: MCP10:2025
    title: "Context Injection & Over-Sharing"
    description: >
      Sensitive prompts, context windows, or retrieved data over-shared into
      agent context, enabling leakage or manipulation of downstream behavior.
    severity: medium
    checks:
      - type: context_injection
      - type: excessive_context_sharing
